<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to your Todo Application account">
    <title>Login — TodoApp</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="glass-card auth-card">
            <div style="text-align:center;margin-bottom:1.5rem">
                <div class="nav-brand-icon" style="width:48px;height:48px;font-size:1.5rem;margin:0 auto 0.75rem;border-radius:12px">✓</div>
            </div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to manage your todos</p>

            <div id="auth-alert" class="alert"></div>

            <form id="login-form" autocomplete="on">
                <div class="form-group">
                    <label class="form-label" for="login-username">Username</label>
                    <input class="form-input" type="text" id="login-username" placeholder="Enter your username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    <input class="form-input" type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" required>
                </div>
                <button class="btn btn-primary btn-full" type="submit" id="login-btn">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="/static/register.html">Create one</a>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/auth.js"></script>
</body>
</html>
