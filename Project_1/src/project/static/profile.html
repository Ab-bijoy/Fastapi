<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage your profile and account settings">
    <title>Profile — TodoApp</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="nav-brand">
                <div class="nav-brand-icon">✓</div>
                TodoApp
            </div>
            <div class="nav-links">
                <a href="/static/dashboard.html" class="nav-link">Dashboard</a>
                <a href="/static/profile.html" class="nav-link active">Profile</a>
                <a href="/static/admin.html" class="nav-link" id="nav-admin" style="display:none">Admin</a>
            </div>
            <div class="nav-user">
                <span style="font-size:0.85rem;color:var(--text-secondary)" id="nav-username"></span>
                <div class="nav-avatar" id="nav-avatar"></div>
                <button class="btn btn-ghost btn-sm" onclick="api.logout()" title="Sign out">⏻</button>
            </div>
        </nav>

        <!-- Header -->
        <div style="margin-bottom:1.5rem">
            <h1 class="page-title">My Profile</h1>
            <p class="page-subtitle">Manage your account settings</p>
        </div>

        <div id="profile-alert" class="alert"></div>

        <!-- Profile Header Card -->
        <div class="glass-card" style="margin-bottom:1.5rem">
            <div class="profile-header">
                <div class="profile-avatar" id="profile-avatar">U</div>
                <div class="profile-info">
                    <h2 id="profile-name">Loading...</h2>
                    <p id="profile-email">—</p>
                    <span class="role-badge user" id="profile-role-badge">user</span>
                </div>
            </div>
        </div>

        <div class="profile-grid">
            <!-- Account Info -->
            <div class="glass-card profile-section">
                <h3 class="section-title">Account Information</h3>
                <div class="info-row">
                    <span class="info-label">Username</span>
                    <span class="info-value" id="info-username">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Email</span>
                    <span class="info-value" id="info-email">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">First Name</span>
                    <span class="info-value" id="info-firstname">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Last Name</span>
                    <span class="info-value" id="info-lastname">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Phone</span>
                    <span class="info-value" id="info-phone">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Status</span>
                    <span class="info-value" id="info-status">—</span>
                </div>
            </div>

            <!-- Settings -->
            <div style="display:flex;flex-direction:column;gap:1.5rem">
                <!-- Phone Update -->
                <div class="glass-card profile-section">
                    <h3 class="section-title">Update Phone Number</h3>
                    <div id="phone-alert" class="alert"></div>
                    <form id="phone-form">
                        <div class="form-group">
                            <label class="form-label" for="phone-input">Phone Number</label>
                            <input class="form-input" type="tel" id="phone-input" placeholder="+1 234 567 8900">
                        </div>
                        <button class="btn btn-primary btn-full" type="submit" id="phone-btn">Update Phone</button>
                    </form>
                </div>

                <!-- Password Change -->
                <div class="glass-card profile-section">
                    <h3 class="section-title">Change Password</h3>
                    <div id="password-alert" class="alert"></div>
                    <form id="password-form">
                        <div class="form-group">
                            <label class="form-label" for="current-password">Current Password</label>
                            <input class="form-input" type="password" id="current-password" placeholder="Enter current password" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="new-password">New Password</label>
                            <input class="form-input" type="password" id="new-password" placeholder="Enter new password" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="confirm-new-password">Confirm New Password</label>
                            <input class="form-input" type="password" id="confirm-new-password" placeholder="Confirm new password" required>
                        </div>
                        <button class="btn btn-primary btn-full" type="submit" id="password-btn">Change Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/profile.js"></script>
</body>
</html>
