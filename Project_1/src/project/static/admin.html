<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin panel — manage all users and todos">
    <title>Admin Panel — TodoApp</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="nav-brand">
                <div class="nav-brand-icon">✓</div>
                TodoApp
            </div>
            <div class="nav-links">
                <a href="/static/dashboard.html" class="nav-link">Dashboard</a>
                <a href="/static/profile.html" class="nav-link">Profile</a>
                <a href="/static/admin.html" class="nav-link active" id="nav-admin">Admin</a>
            </div>
            <div class="nav-user">
                <span style="font-size:0.85rem;color:var(--text-secondary)" id="nav-username"></span>
                <div class="nav-avatar" id="nav-avatar"></div>
                <button class="btn btn-ghost btn-sm" onclick="api.logout()" title="Sign out">⏻</button>
            </div>
        </nav>

        <!-- Header -->
        <div style="margin-bottom:1.5rem">
            <h1 class="page-title">Admin Panel</h1>
            <p class="page-subtitle">Manage users and todos across the platform</p>
        </div>

        <!-- Stats -->
        <div class="stats-bar" style="margin-bottom:2rem">
            <div class="stat-card">
                <div class="stat-value" id="admin-users-count">0</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="admin-todos-count">0</div>
                <div class="stat-label">Total Todos</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tab-group">
            <button class="tab-btn active" data-tab="tab-users">👥 Users</button>
            <button class="tab-btn" data-tab="tab-todos">📋 All Todos</button>
        </div>

        <!-- Users Tab -->
        <div class="tab-panel active" id="tab-users">
            <div class="glass-card" style="overflow-x:auto">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Name</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Phone</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <tr><td colspan="6" style="text-align:center;padding:2rem"><span class="loading-spinner"></span></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Todos Tab -->
        <div class="tab-panel" id="tab-todos">
            <div class="glass-card" style="overflow-x:auto">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Todo</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Owner</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="todos-tbody">
                        <tr><td colspan="6" style="text-align:center;padding:2rem"><span class="loading-spinner"></span></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/admin.js"></script>
</body>
</html>
